<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siirt Evliya Çelebi TMTAL | Simetri V23 (Tam Ekran)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* AMIRI FONTU (İhtiyaç olursa diye kalsın) */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --main-bg: #0f172a; 
            --text-color: #f8fafc;
            --accent-color: #f59e0b;
        }

        body {
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            background-color: var(--main-bg);
        }

        /* YÜKLEME EKRANI */
        #loader { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: #0f172a; color: white; z-index: 200; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 2.5rem; flex-direction: column; font-weight: bold; letter-spacing: 2px;
        }

        /* ANA SAHNE (ARTIK %100) */
        main { 
            width: 100%; height: 100%; 
            position: relative; 
            background: #000; 
        }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden; transition: opacity 0.8s, visibility 0.8s;
            background: var(--main-bg); 
            display: flex; justify-content: center; align-items: center; 
            padding: 0; /* Tam ekran olduğu için padding sıfırlandı, içerik ayarlar */
            box-sizing: border-box;
        }
        .slide.active { opacity: 1; visibility: visible; z-index: 10; }

        /* Haber Slaytı */
        .news-slide { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            color: #fff; flex-direction: column; text-align: center; 
            padding: 5rem; /* Geniş ekran olduğu için padding arttı */
            border: none;
        }
        .news-badge { 
            background: #ef4444; color: white; padding: 10px 40px; 
            font-weight: bold; letter-spacing: 4px; border-radius: 60px; 
            margin-bottom: 3rem; font-size: 1.5rem; text-transform: uppercase; 
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); animation: pulse 2s infinite; 
        }
        .news-title { font-size: 4.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 2rem; color: #fff; }
        .news-content { font-size: 2.2rem; font-weight: 400; line-height: 1.5; color: #cbd5e1; max-width: 85%; }
        
        /* Medya */
        .media-content { width: 100%; height: 100%; object-fit: contain; background: #000; }
        iframe.youtube-embed { width: 100%; height: 100%; border: none; }
        
        /* Sınav Stilleri (Genişletildi) */
        .exam-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .class-header { background: var(--theme-color); color: #fff; padding: 1.5rem; text-align: center; font-size: 3rem; font-weight: 800; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .grid-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; height: 100%; align-content: start; }
        .day-card { background: #ffffff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .day-header { background: #f1f5f9; padding: 15px; text-align: center; border-bottom: 5px solid var(--theme-color); }
        .date-text { font-size: 2rem; font-weight: 900; color: var(--theme-color); }
        .day-name { font-size: 1.4rem; color: #334155; opacity: 0.8; font-weight: 700; }
        .exam-list { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: flex-start; }
        .exam-item { display: flex; align-items: stretch; background: #f8fafc; border-radius: 8px; overflow: hidden; min-height: 65px; border: 1px solid #e2e8f0; }
        .exam-hour { background: var(--theme-color); color: #fff; width: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: 800; line-height: 1; }
        .exam-hour span { font-size: 0.8rem; font-weight: normal; }
        .exam-lesson { flex: 1; display: flex; align-items: center; padding: 0 15px; font-weight: 700; color: #1e293b; font-size: 1.4rem; line-height: 1.2; }

        .progress-bar { position: absolute; bottom: 0; left: 0; height: 8px; background: var(--accent-color); width: 0%; z-index: 50; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loader">SİSTEM YÜKLENİYOR...<br><span style="font-size:1rem; margin-top:10px; opacity:0.7;">Siirt Evliya Çelebi TMTAL Panosu</span></div>

    <main id="slider-stage">
        <div class="progress-bar" id="progress"></div>
    </main>

    <script>
        // ===============================================================
        // CSV LİNKLERİ (SÖZLER LİNKİNİ KALDIRDIK)
        // ===============================================================
        const CSV_MEDYA =     "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZVHePaoezGmveXoNkXIzZnrWOPyj7CWDQMIpZFkiySklVPPWh1WpGO9QGYPQ86868taRJFfADH8Ow/pub?gid=167087393&single=true&output=csv";
        const CSV_SINAVLAR =  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZVHePaoezGmveXoNkXIzZnrWOPyj7CWDQMIpZFkiySklVPPWh1WpGO9QGYPQ86868taRJFfADH8Ow/pub?gid=501842148&single=true&output=csv";
        const CSV_AYARLAR =   "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZVHePaoezGmveXoNkXIzZnrWOPyj7CWDQMIpZFkiySklVPPWh1WpGO9QGYPQ86868taRJFfADH8Ow/pub?gid=528247398&single=true&output=csv";
        // ===============================================================

        let allSlides = [];
        let currentSlideIdx = 0;
        let slideTimer = null;
        let isFirstLoad = true;

        async function updateSystem() {
            try {
                // SÖZLER verisini artık çekmiyoruz, sadece medya, sınav ve ayar
                let ayarPromise = (CSV_AYARLAR && CSV_AYARLAR.startsWith("http")) ? fetchData(CSV_AYARLAR) : Promise.resolve([]);
                const [medyaData, sinavData, ayarData] = await Promise.all([
                    fetchData(CSV_MEDYA), fetchData(CSV_SINAVLAR), ayarPromise
                ]);

                // Tema Ayarı (Arka plan rengi değişimi için basit mantık)
                /* (İsteğe bağlı tema kodu burada tutulabilir ama tam ekranda içerik baskın olduğu için sadeleştirdik) */

                let newSlides = [];

                // --- SINAVLAR (AKILLI SİSTEM & SORUMLULUK MODU) ---
                let examsMap = {};
                sinavData.forEach(row => {
                    if (row.Sinif) {
                        let tur = row.Tur ? row.Tur.trim() : 'Normal'; 
                        let key = row.Sinif.trim() + '_' + tur;
                        if (!examsMap[key]) { examsMap[key] = { sinif: row.Sinif.trim(), tur: tur, liste: [] }; }
                        examsMap[key].liste.push(row);
                    }
                });

                Object.values(examsMap).forEach(grup => {
                    let slideColor, titleSuffix;
                    if (grup.tur.toLowerCase() === 'sorumluluk') {
                        slideColor = '#dc2626'; // KIRMIZI
                        titleSuffix = 'SORUMLULUK SINAVI';
                    } else {
                        if (grup.sinif == '9') slideColor = '#0284c7';
                        else if (grup.sinif == '10') slideColor = '#ea580c';
                        else if (grup.sinif == '11') slideColor = '#059669';
                        else slideColor = '#7c3aed';
                        titleSuffix = 'SINAV PROGRAMI';
                    }
                    newSlides.push({ type: 'exam', grade: grup.sinif, data: grup.liste, color: slideColor, titleSuffix: titleSuffix });
                });

                // --- MEDYA & HTML MODU ---
                medyaData.forEach(m => {
                    if(m.Tip) {
                        let type = m.Tip.toLowerCase().trim();
                        if(type === 'haber' || type === 'yazi') {
                            newSlides.push({ type: 'news', title: m.Link, text: m.Aciklama, duration: (parseInt(m.Sure) || 15) * 1000 });
                        } 
                        // ** HTML MODU **
                        else if (type === 'html') {
                             newSlides.push({ type: 'custom_html', content: m.Aciklama, duration: (parseInt(m.Sure) || 20) * 1000 });
                        }
                        else if(m.Link) {
                            let url = m.Link;
                            let mediaType = type;
                            if (mediaType === 'youtube' || url.includes('youtube.com') || url.includes('youtu.be')) {
                                mediaType = 'youtube';
                                const videoId = getYouTubeID(url);
                                if(videoId) url = videoId;
                            }
                            newSlides.push({ type: 'media', url: url, mediaType: mediaType, duration: (parseInt(m.Sure) || 15) * 1000 });
                        }
                    }
                });

                allSlides = newSlides;

                if(isFirstLoad) {
                    document.getElementById('loader').style.display = 'none';
                    if(allSlides.length > 0) renderSlide(0);
                    isFirstLoad = false;
                }
            } catch (err) { console.error(err); document.getElementById('loader').style.display = 'none'; }
        }

        setTimeout(() => { if(document.getElementById('loader').style.display !== 'none') document.getElementById('loader').style.display = 'none'; }, 8000);

        function shootConfetti() {
            var duration = 3000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function renderSlide(index) {
            const stage = document.getElementById('slider-stage');
            const progress = document.getElementById('progress');
            const slideData = allSlides[index];
            if(!slideData) return;

            Array.from(stage.children).forEach(child => { if(child.id !== 'progress') stage.removeChild(child); });
            const slideEl = document.createElement('div');
            slideEl.className = 'slide';

            let duration = slideData.duration || 10000;

            if(slideData.type === 'exam') {
                slideEl.style.setProperty('--theme-color', slideData.color);
                slideEl.innerHTML = getExamHTML(slideData);
            } 
            else if (slideData.type === 'news') {
                slideEl.classList.add('news-slide');
                slideEl.innerHTML = `<div class="news-badge">DUYURU</div><div class="news-title">${slideData.title}</div><div class="news-content">${slideData.text || ''}</div>`;
                let fullText = (slideData.title + " " + (slideData.text||"")).toLowerCase();
                if(fullText.includes("doğum günü") || fullText.includes("dogum gunu") || fullText.includes("doğdun") || fullText.includes("kutlu olsun")) shootConfetti();
            }
            // ** HTML RENDER MODU **
            else if (slideData.type === 'custom_html') {
                slideEl.style.background = '#000'; 
                slideEl.style.color = '#fff';
                slideEl.style.display = 'flex';
                slideEl.style.justifyContent = 'center';
                slideEl.style.alignItems = 'center';
                slideEl.style.overflow = 'hidden';
                slideEl.innerHTML = slideData.content;
            }
            else if (slideData.type === 'media') {
                slideEl.style.background = '#000';
                if(slideData.mediaType === 'youtube') slideEl.innerHTML = `<iframe class="youtube-embed" src="https://www.youtube.com/embed/${slideData.url}?autoplay=1&mute=1&controls=0&loop=1&playlist=${slideData.url}" allow="autoplay; encrypted-media"></iframe>`;
                else if(slideData.mediaType.includes('video')) slideEl.innerHTML = `<video src="${slideData.url}" class="media-content" autoplay muted loop></video>`;
                else slideEl.innerHTML = `<img src="${slideData.url}" class="media-content">`;
            }

            stage.appendChild(slideEl);
            requestAnimationFrame(() => slideEl.classList.add('active'));

            progress.style.transition = 'none'; progress.style.width = '0%'; void progress.offsetWidth;
            setTimeout(() => { progress.style.transition = `width ${duration}ms linear`; progress.style.width = '100%'; }, 50);

            clearTimeout(slideTimer);
            slideTimer = setTimeout(() => { currentSlideIdx = (currentSlideIdx + 1) % allSlides.length; renderSlide(currentSlideIdx); }, duration);
        }

        function fetchData(url) { 
    // Linkin sonuna rastgele sayı ekliyoruz ki tarayıcı "Aaa bu yeni dosya" sansın
    const antiCacheUrl = url + "&cache_buster=" + Date.now();
    
    return new Promise((resolve) => { 
        Papa.parse(antiCacheUrl, { 
            download: true, 
            header: true, 
            skipEmptyLines: true, 
            complete: (results) => resolve(results.data), 
            error: () => resolve([]) 
        }); 
    }); 
}

        function getYouTubeID(url) { const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (match && match[2].length === 11) ? match[2] : null; }
        
        function getExamHTML(slide) {
            let cards = slide.data.map(exam => {
                let rows = "";
                if(exam.Ders3) rows += `<div class="exam-item"><div class="exam-hour">3.<span>DERS</span></div><div class="exam-lesson">${exam.Ders3}</div></div>`;
                if(exam.Ders5) rows += `<div class="exam-item"><div class="exam-hour">5.<span>DERS</span></div><div class="exam-lesson">${exam.Ders5}</div></div>`;
                if(exam.Ders9) rows += `<div class="exam-item"><div class="exam-hour">9.<span>DERS</span></div><div class="exam-lesson">${exam.Ders9}</div></div>`;
                return `<div class="day-card"><div class="day-header"><div class="date-text">${exam.Tarih||''}</div><div class="day-name">${exam.Gun||''}</div></div><div class="exam-list">${rows}</div></div>`;
            }).join('');
            return `<div class="exam-container"><div class="class-header">${slide.grade}. SINIF ${slide.titleSuffix}</div><div class="grid-wrapper">${cards}</div></div>`;
        }

        updateSystem(); setInterval(updateSystem, 60000);
    </script>
</body>
</html>
